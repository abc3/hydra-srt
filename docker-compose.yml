services:
  hydra_srt:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Docker Desktop (macOS/Windows) does not support Linux-style host networking.
    # Use the default bridge network with explicit port mappings for portability.
    ports:
      - "4000:4000"
      - "4100-4500:4100-4500/udp"
    environment:
      - NODE_IP=127.0.0.1
      - HYDRA_DEFAULT_BIND_IP=0.0.0.0
      - SECRET_KEY_BASE=9re8gLwrcmLnNcUbxe8xgKSCNfm8gIpgoBBiCXhV0dVfJMB8DVFB3QQJwOye0iIo
      - RELEASE_COOKIE="test_cookie"
      - PHX_SERVER=true
      - PORT=4000
      - PHX_HOST=localhost
      - API_AUTH_USERNAME=admin
      - API_AUTH_PASSWORD=password123
      - DATABASE_PATH=${DATABASE_PATH:-/app/db/hydra_srt.db}
      - ANALYTICS_DATABASE_PATH=${ANALYTICS_DATABASE_PATH:-/app/db/hydra_srt_analytics.duckdb}
      - POOL_SIZE=${POOL_SIZE:-1}
      - RLIMIT_NOFILE=65536
    volumes:
      - ./data/backup:/app/backup
      - ./data/db:/app/db
